<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TrustGate Widget Demo</title>
    <style>
      body {
        margin: 0;
        background: #0a0f1e;
        color: #e2e8f0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 48px 24px;
      }
      .wrap { max-width: 560px; margin: 0 auto; }
      h1 { font-size: 22px; margin: 0 0 6px; }
      p.sub { color: #94a3b8; font-size: 14px; margin: 0 0 28px; }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px;
        border: 1px solid #1e293b;
        border-radius: 12px;
        margin-bottom: 10px;
        background: #0d1426;
      }
      .coin { display: flex; flex-direction: column; gap: 2px; }
      .coin b { font-size: 14px; }
      .coin small { color: #64748b; font-size: 11px; }
      code { color: #2dd4bf; font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>TrustGate widget demo</h1>
      <p class="sub">
        Each row has a placeholder marked with data-trustgate-coin. The widget
        fills it with a badge. Hover a badge to see the signals.
      </p>

      <div class="row">
        <span class="coin"><b>Sui</b><small>0x2::sui::SUI</small></span>
        <span data-trustgate-coin="0x2::sui::SUI"></span>
      </div>

      <div class="row">
        <span class="coin"><b>Cetus</b><small>cetus::CETUS</small></span>
        <span data-trustgate-coin="0x06864a6f921804860930db6ddbe2e16acdf8504495ea7481637a1c8b9a8fe54b::cetus::CETUS"></span>
      </div>

      <p class="sub" style="margin-top: 24px">
        Embed code: <code>&lt;span data-trustgate-coin="COIN_TYPE"&gt;&lt;/span&gt;</code>
      </p>
    </div>

    <!-- For local testing this points at your dev server. Change data-api to
         your deployed /api/coin URL in production. -->
    <script src="/widget.js" data-api="https://sui.trustgated.xyz/api/coin" defer></script>
  </body>
</html>
